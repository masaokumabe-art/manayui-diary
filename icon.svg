<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B63C4"/>
      <stop offset="100%" stop-color="#5C3D8F"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#F0A8CF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F0A8CF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景円 -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="256" fill="url(#glow)"/>

  <!-- 蓮の花びら（外側） -->
  <!-- 下の大きな花びら -->
  <ellipse cx="256" cy="330" rx="38" ry="70" fill="#F0A8CF" opacity="0.85" transform="rotate(0,256,256)"/>
  <ellipse cx="256" cy="330" rx="38" ry="70" fill="#F0A8CF" opacity="0.85" transform="rotate(45,256,256)"/>
  <ellipse cx="256" cy="330" rx="38" ry="70" fill="#F0A8CF" opacity="0.85" transform="rotate(90,256,256)"/>
  <ellipse cx="256" cy="330" rx="38" ry="70" fill="#F0A8CF" opacity="0.85" transform="rotate(135,256,256)"/>
  <ellipse cx="256" cy="330" rx="38" ry="70" fill="#F0A8CF" opacity="0.85" transform="rotate(180,256,256)"/>
  <ellipse cx="256" cy="330" rx="38" ry="70" fill="#F0A8CF" opacity="0.85" transform="rotate(225,256,256)"/>
  <ellipse cx="256" cy="330" rx="38" ry="70" fill="#F0A8CF" opacity="0.85" transform="rotate(270,256,256)"/>
  <ellipse cx="256" cy="330" rx="38" ry="70" fill="#F0A8CF" opacity="0.85" transform="rotate(315,256,256)"/>

  <!-- 中間の花びら -->
  <ellipse cx="256" cy="310" rx="28" ry="55" fill="#EDE0FF" opacity="0.95" transform="rotate(22.5,256,256)"/>
  <ellipse cx="256" cy="310" rx="28" ry="55" fill="#EDE0FF" opacity="0.95" transform="rotate(67.5,256,256)"/>
  <ellipse cx="256" cy="310" rx="28" ry="55" fill="#EDE0FF" opacity="0.95" transform="rotate(112.5,256,256)"/>
  <ellipse cx="256" cy="310" rx="28" ry="55" fill="#EDE0FF" opacity="0.95" transform="rotate(157.5,256,256)"/>
  <ellipse cx="256" cy="310" rx="28" ry="55" fill="#EDE0FF" opacity="0.95" transform="rotate(202.5,256,256)"/>
  <ellipse cx="256" cy="310" rx="28" ry="55" fill="#EDE0FF" opacity="0.95" transform="rotate(247.5,256,256)"/>
  <ellipse cx="256" cy="310" rx="28" ry="55" fill="#EDE0FF" opacity="0.95" transform="rotate(292.5,256,256)"/>
  <ellipse cx="256" cy="310" rx="28" ry="55" fill="#EDE0FF" opacity="0.95" transform="rotate(337.5,256,256)"/>

  <!-- 中心の円 -->
  <circle cx="256" cy="256" r="52" fill="#C9962A"/>
  <circle cx="256" cy="256" r="44" fill="#F5DFA0"/>
  <circle cx="256" cy="256" r="34" fill="#C9962A"/>
  <circle cx="256" cy="256" r="26" fill="#FFF8E8"/>

  <!-- 中心のM字（まなゆい） -->
  <text x="256" y="268" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#5C3D8F">M</text>
</svg>
